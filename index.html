<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaden Hart — Narrative Designer & World Builder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #16162a 100%);
            color: #e4e4e4;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .container { padding: 40px; max-width: 600px; }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #7c3aed, #06b6d4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #94a3b8; font-size: 1.1rem; margin-bottom: 40px; }
        .links { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .links a {
            color: #06b6d4;
            text-decoration: none;
            padding: 14px 28px;
            border: 2px solid #06b6d4;
            border-radius: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .links a:hover { background: #06b6d4; color: #0a0a0f; }
        .links a.primary { background: #7c3aed; border-color: #7c3aed; color: #fff; }
        .links a.primary:hover { background: #9d6bff; border-color: #9d6bff; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Kaden Hart</h1>
        <p class="subtitle">Narrative Designer & World Builder</p>
        <div class="links">
            <a href="/portfolio/" class="primary">Portfolio</a>
        </div>
    </div>
</body>
</html>
